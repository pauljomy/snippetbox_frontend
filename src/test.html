<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snippetbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 min-h-screen">
    <!-- Rainbow band -->
    <div
      class="h-1.5 w-full"
      style="
        background: linear-gradient(
          to right,
          #e74c3c 0% 16.6%,
          #e67e22 16.6% 33.2%,
          #f1c40f 33.2% 49.8%,
          #2ecc71 49.8% 66.4%,
          #3498db 66.4% 83%,
          #9b59b6 83% 100%
        );
      "
    ></div>

    <!-- Header -->
    <header class="bg-white border-b border-gray-200">
      <div
        class="max-w-4xl mx-auto px-6 py-4 flex items-center justify-center gap-3"
      >
        <!-- Box icon (inline SVG approximation) -->
        <svg
          class="w-8 h-8 text-slate-700"
          viewBox="0 0 24 24"
          fill="currentColor"
        >
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
        </svg>
        <span class="text-2xl font-bold text-slate-700 tracking-tight"
          >Snippetbox</span
        >
      </div>
    </header>

    <!-- Nav -->
    <nav class="bg-white border-b border-gray-200">
      <div
        class="max-w-4xl mx-auto px-6 py-2 flex items-center justify-between"
      >
        <div class="flex gap-6 text-sm font-mono">
          <a href="#" class="text-green-600 hover:underline">Home</a>
          <a
            href="#"
            class="text-slate-700 hover:text-green-600 hover:underline"
            >Create snippet</a
          >
        </div>
        <a href="#" class="text-sm font-mono text-green-600 hover:underline"
          >Logout</a
        >
      </div>
      <!-- Arrow indicator under "Create snippet" -->
      <div class="max-w-4xl mx-auto px-6 relative">
        <div
          class="absolute left-[calc(6rem+1.5rem)] -top-0.5 w-3 h-3 border-l border-t border-gray-200 bg-white rotate-45 transform translate-y-1"
        ></div>
      </div>
    </nav>

    <!-- Main content -->
    <main class="max-w-4xl mx-auto px-6 py-8">
      <div class="bg-gray-50 rounded p-8 shadow-sm">
        <!-- Title field -->
        <div class="mb-6">
          <label class="block text-sm font-mono text-slate-700 mb-1"
            >Title:</label
          >
          <input
            type="text"
            class="w-full border border-gray-300 rounded px-3 py-2 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-blue-400"
          />
        </div>

        <!-- Content field -->
        <div class="mb-6">
          <label class="block text-sm font-mono text-slate-700 mb-1"
            >Content:</label
          >
          <textarea
            rows="10"
            class="w-full border border-gray-300 rounded px-3 py-2 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-blue-400 resize-y"
          ></textarea>
        </div>

        <!-- Delete in radio buttons -->
        <div
          class="mb-8 flex items-center gap-6 text-sm font-mono text-slate-700"
        >
          <span>Delete in:</span>

          <label class="flex items-center gap-1.5 cursor-pointer">
            <input
              type="radio"
              name="expiry"
              value="year"
              checked
              class="accent-red-500 cursor-pointer"
            />
            <span>One Year</span>
          </label>

          <label class="flex items-center gap-1.5 cursor-pointer">
            <input
              type="radio"
              name="expiry"
              value="week"
              class="cursor-pointer"
            />
            <span>One Week</span>
          </label>

          <label class="flex items-center gap-1.5 cursor-pointer">
            <input
              type="radio"
              name="expiry"
              value="day"
              class="cursor-pointer"
            />
            <span>One Day</span>
          </label>
        </div>

        <!-- Submit button -->
        <button
          class="bg-green-500 hover:bg-green-600 text-white text-sm font-mono font-semibold px-6 py-3 rounded cursor-pointer transition-colors"
        >
          Publish snippet
        </button>
      </div>
    </main>
  </body>
</html>
